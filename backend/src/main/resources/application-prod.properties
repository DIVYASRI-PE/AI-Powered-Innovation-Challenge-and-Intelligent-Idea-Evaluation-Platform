# ── Production Configuration (Render) ──────────────
# DATABASE_URL is auto-converted in InnovationApplication.java
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - keep small for free tier
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT
jwt.secret=${JWT_SECRET:InnovateAI-Secret-Key-2025-Minimum256BitsLong}
jwt.expiration=86400000

# CORS - Vercel frontend URL
cors.allowed-origins=${FRONTEND_URL:*}

# AI Agent
ai.agent.url=${AI_AGENT_URL:http://localhost:3001}

# Server
server.port=${PORT:8080}

# Disable unnecessary features
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
