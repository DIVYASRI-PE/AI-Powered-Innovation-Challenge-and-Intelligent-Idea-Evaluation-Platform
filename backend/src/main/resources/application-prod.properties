# Production - Render PostgreSQL
# NOTE: spring.datasource.url/username/password set programmatically in InnovationApplication.java
spring.datasource.driver-class-name=org.postgresql.Driver

# Override default MySQL datasource URL to prevent fallback
spring.datasource.url=jdbc:postgresql://localhost:5432/innovationdb
spring.datasource.username=postgres
spring.datasource.password=postgres

# HikariCP pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT
jwt.secret=${JWT_SECRET:InnovateAI-Secret-Key-2025-Minimum256BitsLong}
jwt.expiration=86400000

# CORS - allow all origins for production
cors.allowed-origins=${FRONTEND_URL:*}
cors.allowed-origins-pattern=*

# AI Agent
ai.agent.url=${AI_AGENT_URL:http://localhost:3001}

# Server
server.port=${PORT:8080}
spring.devtools.restart.enabled=false
