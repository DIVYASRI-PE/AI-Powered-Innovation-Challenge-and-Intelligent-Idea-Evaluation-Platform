# Server Configuration
server.port=8080
spring.application.name=innovation-platform

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/innovation_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Divyasri22@_
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=InnovateAI-Secret-Key-2025-Minimum256BitsLongForSecurity-Platform
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Agent
ai.agent.url=http://localhost:3001

# Logging
logging.level.root=WARN
logging.level.com.innovation=INFO
