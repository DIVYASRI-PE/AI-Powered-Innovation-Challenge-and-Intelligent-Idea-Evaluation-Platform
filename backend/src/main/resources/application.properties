# Server
server.port=8080
spring.application.name=innovation-platform

# ── PostgreSQL (local dev) ──────────────────────────
# For local: install PostgreSQL and create DB: createdb innovation_platform
# OR use Render PostgreSQL URL directly for testing
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/innovation_platform}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:InnovateAI-Secret-Key-2025-Minimum256BitsLongForSecurity}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173},http://localhost:3000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Agent
ai.agent.url=${AI_AGENT_URL:http://localhost:3001}

# Logging
logging.level.root=WARN
logging.level.com.innovation=INFO
